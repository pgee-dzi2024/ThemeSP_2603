<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Умен дом - Контролен панел</title>
    <!-- Зареждаме Bootstrap за красив дизайн -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Зареждаме Vue 3 и Axios от CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        .bulb {
            font-size: 5rem;
            transition: color 0.3s ease;
        }
        .bulb-on { color: #ffc107; text-shadow: 0 0 20px #ffc107; }
        .bulb-off { color: #6c757d; }
    </style>
</head>
<body class="bg-light">

<div id="app" class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h2 class="mb-4">Контрол на осветлението</h2>

            <!-- Показване на грешки -->
            <div v-if="errorMessage" class="alert alert-danger" role="alert">
                [[ errorMessage ]]
            </div>

            <div class="card shadow-sm p-4">
                <!-- Визуална индикация на статуса -->
                <div class="mb-4">
                    <i class="bulb" :class="isDeviceOn ? 'bulb-on' : 'bulb-off'">💡</i>
                    <h4 class="mt-2">
                        Статус:
                        <span v-if="isLoading" class="text-secondary">Проверява се...</span>
                        <span v-else-if="isDeviceOn" class="text-success">Включено</span>
                        <span v-else class="text-danger">Изключено</span>
                    </h4>
                </div>

                <!-- Бутони за управление -->
                <div class="d-grid gap-2 col-8 mx-auto">
                    <button
                        class="btn btn-success btn-lg"
                        @click="sendCommand('ON')"
                        :disabled="isLoading || isDeviceOn">
                        Включи
                    </button>
                    <button
                        class="btn btn-danger btn-lg"
                        @click="sendCommand('OFF')"
                        :disabled="isLoading || !isDeviceOn">
                        Изключи
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
        delimiters: ['[[', ']]'],
        setup() {
            const isDeviceOn = ref(false);
            const isLoading = ref(true);
            const errorMessage = ref('');

            // Функция за проверка на първоначалния статус при зареждане
            const checkStatus = async () => {
                try {
                    const response = await axios.get('/api/device/');
                    // Очакваме отговор от типа "STATUS:ON" или "STATUS:OFF"
                    if (response.data.device_state.includes('ON')) {
                        isDeviceOn.value = true;
                    } else {
                        isDeviceOn.value = false;
                    }
                    errorMessage.value = '';
                } catch (error) {
                    errorMessage.value = error.response?.data?.message || 'Грешка при връзка със сървъра!';
                } finally {
                    isLoading.value = false;
                }
            };

            // Функция за изпращане на команда за включване/изключване
            const sendCommand = async (command) => {
                isLoading.value = true;
                errorMessage.value = '';
                try {
                    // Изпращаме POST заявка към нашето Django API
                    const response = await axios.post('/api/device/', { command: command });

                    if (response.data.status === 'ok') {
                        isDeviceOn.value = command === 'ON';
                    }
                } catch (error) {
                    errorMessage.value = error.response?.data?.message || 'Командата не беше изпълнена!';
                } finally {
                    isLoading.value = false;
                }
            };

            // Изпълняваме проверката на статуса веднага щом страницата се зареди
            onMounted(() => {
                checkStatus();
            });

            return {
                isDeviceOn,
                isLoading,
                errorMessage,
                sendCommand
            };
        }
    }).mount('#app');
</script>

</body>
</html>
